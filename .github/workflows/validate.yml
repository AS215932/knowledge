name: validate

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --group dev --frozen
      - name: Ruff
        run: uv run ruff check src tests
      - name: Mypy
        run: uv run mypy --strict src
      - name: Tests
        run: uv run pytest
      - name: OKF validation
        run: uv run hyrule-knowledge validate okf
      - name: Quality gate
        run: uv run hyrule-knowledge quality --check
      - name: Export check
        run: uv run hyrule-knowledge export --check
      - name: Eval check
        run: uv run hyrule-knowledge eval --check
      - name: Learning ledger check
        run: uv run hyrule-knowledge ledger --check
      - name: Secret scan
        run: uv run hyrule-knowledge scan-secrets okf exports reports evals ledger schema
