version: knowledge_policy_v1
# Built-in YAML policy evaluator input. Request/decision shape is OPA-like,
# but this tranche intentionally avoids an OPA runtime dependency.
defaults:
  result: deny
  max_context_pack_tokens: 8000
  max_result_refs: 40
  deny_data_classes:
    - secret
    - credential
    - raw_log
    - packet_capture
  production_mutation_result: require_human
roles:
  engineering_loop:
    allow_actions:
      - knowledge.resolve
      - knowledge.search
      - knowledge.claims
      - knowledge.neighborhood
      - knowledge.context_pack.generate
      - knowledge.intended_state.read
      - knowledge.observed_state.read
      - knowledge.diff.read
      - knowledge.intended_state
      - knowledge.observed_state
      - knowledge.diff_intended_observed
      - knowledge.endpoint_schema
      - knowledge.deployment_pins
      - knowledge.endpoint_schema.read
      - knowledge.deployment_pins.read
      - knowledge.policy_decision
      - knowledge.related_runbooks
      - knowledge.find_conflicts
      - knowledge.find_stale
      - local.test.run
      - draft_pr.create
    require_human_actions:
      - production.deploy
      - production.restart_service
      - production.modify_firewall
      - production.modify_routing
      - production.rotate_credentials
  noc_shadow:
    allow_actions:
      - knowledge.resolve
      - knowledge.search
      - knowledge.claims
      - knowledge.neighborhood
      - knowledge.context_pack.generate
      - knowledge.intended_state.read
      - knowledge.observed_state.read
      - knowledge.diff.read
      - knowledge.intended_state
      - knowledge.observed_state.fixture
      - knowledge.diff_intended_observed
      - knowledge.related_runbooks
      - knowledge.find_conflicts
      - knowledge.find_stale
    deny_actions:
      - production.*
      - live_diagnostic.*
      - secret.*
  general:
    allow_actions:
      - knowledge.resolve
      - knowledge.search
      - knowledge.claims
      - knowledge.context_pack.generate
      - knowledge.intended_state
      - knowledge.endpoint_schema
# Rules below document the intended OPA-like policy semantics. The current
# evaluator implements these classes in-process with the keys above.
rules:
  - id: deny_secret_raw_log_packet_data
    effect: deny
    when:
      data_classes_any: [secret, credential, raw_log, packet_capture]
    reason: Knowledge plane must not expose secrets, raw logs, credentials, or packet captures.
  - id: production_mutation_requires_human
    effect: require_human
    when:
      actions_any: [production.deploy, production.restart_service, production.modify_firewall, production.modify_routing]
    reason: Production mutation requires explicit human approval outside the knowledge plane.
  - id: noc_shadow_no_live_tools
    effect: deny
    when:
      actors_any: [noc_shadow]
      action_prefixes_any: [production., live_diagnostic., secret.]
    reason: NOC shadow evals may not invoke live operational tools.
